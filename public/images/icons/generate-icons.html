<!DOCTYPE html>
<html>
<head>
    <title>Generate Icons</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .icon { display: inline-block; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>Icon Generator untuk Kopi Ancol</h1>
    <p>Klik kanan pada icon dan simpan sebagai file PNG</p>
    
    <div class="icon">
        <canvas id="canvas72" width="72" height="72"></canvas><br>
        72x72
    </div>
    <div class="icon">
        <canvas id="canvas96" width="96" height="96"></canvas><br>
        96x96
    </div>
    <div class="icon">
        <canvas id="canvas128" width="128" height="128"></canvas><br>
        128x128
    </div>
    <div class="icon">
        <canvas id="canvas144" width="144" height="144"></canvas><br>
        144x144
    </div>
    <div class="icon">
        <canvas id="canvas152" width="152" height="152"></canvas><br>
        152x152
    </div>
    <div class="icon">
        <canvas id="canvas192" width="192" height="192"></canvas><br>
        192x192
    </div>
    <div class="icon">
        <canvas id="canvas384" width="384" height="384"></canvas><br>
        384x384
    </div>
    <div class="icon">
        <canvas id="canvas512" width="512" height="512"></canvas><br>
        512x512
    </div>

    <script>
        function drawIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2C1810');
            gradient.addColorStop(1, '#4A2C1A');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw cup
            ctx.fillStyle = '#FF6B35';
            ctx.beginPath();
            ctx.moveTo(size * 0.3, size * 0.4);
            ctx.lineTo(size * 0.7, size * 0.4);
            ctx.lineTo(size * 0.65, size * 0.8);
            ctx.lineTo(size * 0.35, size * 0.8);
            ctx.fill();
            
            // Draw handle
            ctx.beginPath();
            ctx.arc(size * 0.75, size * 0.55, size * 0.12, 0, Math.PI * 2);
            ctx.strokeStyle = '#FF8C42';
            ctx.lineWidth = size * 0.05;
            ctx.stroke();
            
            // Draw steam
            ctx.beginPath();
            ctx.moveTo(size * 0.4, size * 0.3);
            ctx.quadraticCurveTo(size * 0.45, size * 0.2, size * 0.5, size * 0.3);
            ctx.moveTo(size * 0.55, size * 0.25);
            ctx.quadraticCurveTo(size * 0.6, size * 0.15, size * 0.65, size * 0.25);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.03;
            ctx.stroke();
            
            // Make canvas downloadable
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        
        drawIcon('canvas72', 72);
        drawIcon('canvas96', 96);
        drawIcon('canvas128', 128);
        drawIcon('canvas144', 144);
        drawIcon('canvas152', 152);
        drawIcon('canvas192', 192);
        drawIcon('canvas384', 384);
        drawIcon('canvas512', 512);
    </script>
</body>
</html>
